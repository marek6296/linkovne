<!-- Linkovne — Magic link or OTP. Supabase → Authentication → Emails →
     Magic link or OTP → Body (Source). Subject: Your Linkovne sign-in link -->
<div style="display:none;max-height:0;overflow:hidden;opacity:0;">Your one-time sign-in link and code for Linkovne.</div>
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f1ea;margin:0;padding:0;">
  <tr>
    <td align="center" style="padding:32px 16px;">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background-color:#ffffff;border:1px solid #e8e6df;border-radius:16px;">
        <tr>
          <td style="padding:36px 36px 8px 36px;" align="left">
            <img src="https://linkovne.com/logo-email.png" width="150" height="40" alt="Linkovne" style="display:block;border:0;width:150px;height:auto;" />
          </td>
        </tr>
        <tr>
          <td style="padding:20px 36px 0 36px;">
            <h1 style="margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:24px;line-height:1.25;font-weight:800;letter-spacing:-0.02em;color:#191813;">Sign in to Linkovne</h1>
            <p style="margin:12px 0 0 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:15px;line-height:1.6;color:#5c5a52;">Tap the button to sign in. This link works once and expires shortly.</p>
          </td>
        </tr>
        <tr>
          <td style="padding:28px 36px 0 36px;">
            <table role="presentation" cellpadding="0" cellspacing="0">
              <tr>
                <td align="center" bgcolor="#2b45d9" style="border-radius:9999px;">
                  <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 30px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:15px;font-weight:700;color:#ffffff;text-decoration:none;border-radius:9999px;">Sign in</a>
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <tr>
          <td style="padding:26px 36px 0 36px;">
            <p style="margin:0 0 8px 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:13px;line-height:1.6;color:#94928a;">Or enter this code:</p>
            <table role="presentation" cellpadding="0" cellspacing="0">
              <tr>
                <td style="background-color:#f4f1ea;border:1px solid #e8e6df;border-radius:12px;padding:14px 22px;font-family:'SF Mono',ui-monospace,Menlo,Consolas,monospace;font-size:26px;font-weight:700;letter-spacing:6px;color:#191813;">{{ .Token }}</td>
              </tr>
            </table>
          </td>
        </tr>
        <tr>
          <td style="padding:28px 36px 36px 36px;">
            <div style="border-top:1px solid #e8e6df;padding-top:20px;">
              <p style="margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:12px;line-height:1.6;color:#94928a;">Didn&rsquo;t try to sign in? You can safely ignore this email.</p>
              <p style="margin:10px 0 0 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:12px;color:#94928a;">&copy; Linkovne &middot; <a href="https://linkovne.com" style="color:#94928a;text-decoration:underline;">linkovne.com</a></p>
            </div>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
